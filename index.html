<!DOCTYPE html>
<html>
<head>
    <title>Value Vault | Real Market Data</title>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: sans-serif; padding: 40px; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; text-align: center; max-width: 600px; margin: auto; }
        h1 { color: #fff; margin-bottom: 5px; }
        .status { color: #00ff88; font-size: 0.8rem; background: rgba(0,255,136,0.1); padding: 5px 12px; border-radius: 50px; }
        .item-list { margin-top: 30px; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .price { color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>
    <div class="glass">
        <h1>VALUE VAULT</h1>
        <span class="status">LIVE UPDATES: NO INFLATION</span>
        <div class="item-list">
            <div class="card"><span>Sledge Hammer</span><span class="price">420 Tokens</span></div>
            <div class="card"><span>Grenade Launcher</span><span class="price">950 Tokens</span></div>
        </div>
    </div>
</body>
</html>
